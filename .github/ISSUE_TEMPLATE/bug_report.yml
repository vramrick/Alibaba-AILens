name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I can reproduce this bug consistently
          required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Backend (Python FastAPI)
        - Frontend (React)
        - Gateway (Java / TraceQL)
        - OTel Collector / Data Ingestion
        - Docker / Deployment
        - Documentation
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 🐛 Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🔄 Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual Behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 💻 Environment
      placeholder: |
        - OS: macOS 14 / Ubuntu 22.04
        - Python: 3.11
        - Node: 20
        - Java: 21
        - Docker: 24
        - AI Lens version / commit:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 📋 Relevant Logs or Screenshots
      render: shell
